spring.application.name=gym-persona-api

spring.datasource.url=jdbc:postgresql://localhost:5432/persona_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:dev.passN18}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=3003
spring.jpa.open-in-view=true

# Feign Client Configuration
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.usuario-service.connectTimeout=3000
feign.client.config.usuario-service.readTimeout=3000

# Spring Cloud Compatibility Verifier (para Spring Boot 3.4.x + Spring Cloud 4.1.x)
spring.cloud.compatibility-verifier.enabled=false
#URL del servicio de usuario
userService.url=http://localhost:3001